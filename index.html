<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#e8b84b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AF Calc">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-152.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Ahmed Fares Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-deep: #080b14; --bg-card: #0f1322; --bg-surface: #161c30;
    --bg-input: #1c2338; --accent: #e8b84b; --accent-dim: #c49a35;
    --accent-glow: rgba(232,184,75,0.18); --accent-soft: rgba(232,184,75,0.08);
    --text-primary: #f0f2f8; --text-secondary: #8b93b0; --text-muted: #4a5270;
    --border: rgba(255,255,255,0.07); --border-accent: rgba(232,184,75,0.3);
    --btn-op: #1e2740; --btn-num: #141929; --radius: 16px;
    --radius-sm: 10px; --radius-btn: 14px; --danger: #e85b4b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body {
    height: 100%; width: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep); color: var(--text-primary);
    overflow: hidden; touch-action: manipulation;
  }
  /* STARS */
  .stars-bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .stars-bg::before {
    content: ''; position: absolute; width: 1px; height: 1px; border-radius: 50%;
    box-shadow: 120px 80px #fff, 240px 130px rgba(255,255,255,.6), 380px 200px #fff,
      50px 350px rgba(255,255,255,.4), 600px 90px #fff, 720px 300px rgba(255,255,255,.7),
      850px 150px rgba(255,255,255,.3), 900px 400px #fff, 1050px 60px rgba(255,255,255,.5),
      200px 500px rgba(255,255,255,.6), 450px 550px #fff, 700px 480px rgba(255,255,255,.4),
      300px 700px rgba(255,255,255,.5), 800px 720px #fff, 500px 800px rgba(255,255,255,.4);
  }
  .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .12; }
  .glow-orb-1 { width:400px; height:400px; background:#e8b84b; top:-100px; right:-80px; }
  .glow-orb-2 { width:350px; height:350px; background:#4b8ee8; bottom:-80px; left:-60px; }

  /* PAGES */
  .page {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .5s ease, transform .5s ease; transform: translateY(20px);
  }
  .page.active { opacity: 1; pointer-events: all; transform: translateY(0); }

  /* ═══ LANDING ═══ */
  .landing-content { text-align: center; z-index: 2; max-width: 680px; }
  .landing-logo {
    width: 80px; height: 80px; margin: 0 auto 28px;
    background: linear-gradient(135deg, var(--accent), #f5c870);
    border-radius: 24px; display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: #000;
    animation: pulse-logo 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100% { box-shadow: 0 0 40px rgba(232,184,75,.4); }
    50%      { box-shadow: 0 0 70px rgba(232,184,75,.65); }
  }
  .landing-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 20px; opacity: .85;
  }
  .landing-title-en {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 4.5vw, 40px); font-weight: 700; line-height: 1.15;
    background: linear-gradient(135deg, #f0f2f8 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 16px;
  }
  .landing-divider { width:60px; height:1px; background:var(--accent); margin:0 auto 20px; opacity:.4; }
  .landing-title-ar {
    font-size: clamp(17px, 3.5vw, 28px); font-weight: 500;
    color: var(--text-secondary); direction: rtl;
    line-height: 1.6; margin-bottom: 48px;
  }
  .btn-start {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 18px 52px; border-radius: 50px;
    background: linear-gradient(135deg, var(--accent), #f5c870);
    color: #000; font-family: 'Outfit', sans-serif;
    font-size: 17px; font-weight: 600; border: none; cursor: pointer;
    box-shadow: 0 8px 40px rgba(232,184,75,.35);
    transition: all .3s; position: relative; overflow: hidden;
  }
  .btn-start:hover { transform: translateY(-3px); box-shadow: 0 14px 50px rgba(232,184,75,.5); }
  .btn-start:active { transform: translateY(-1px) scale(.98); }
  .arrow-circle {
    width:24px; height:24px; border-radius:50%;
    background:rgba(0,0,0,.15);
    display:flex; align-items:center; justify-content:center; font-size:13px;
    transition: transform .3s;
  }
  .btn-start:hover .arrow-circle { transform: translateX(4px); }

  /* PWA install banner */
  .install-banner {
    position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--bg-surface); border: 1px solid var(--border-accent);
    border-radius: 50px; padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; z-index: 999; opacity: 0; pointer-events: none;
    transition: opacity .4s; white-space: nowrap;
  }
  .install-banner.show { opacity: 1; pointer-events: all; }
  .install-banner button {
    background: var(--accent); border: none; border-radius: 20px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; color: #000; cursor: pointer;
  }
  .install-banner .dismiss {
    background: none; color: var(--text-muted); padding: 4px;
  }

  /* ═══ AUTH ═══ */
  .auth-card {
    background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border);
    padding: clamp(26px,5vw,46px) clamp(22px,5vw,42px);
    width: 100%; max-width: 400px; z-index: 2;
    box-shadow: 0 30px 80px rgba(0,0,0,.5);
    max-height: calc(100vh - 40px); overflow-y: auto;
  }
  .auth-header { text-align: center; margin-bottom: 28px; }
  .auth-logo-sm {
    width:50px; height:50px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--accent), #f5c870);
    border-radius:14px; display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',monospace; font-size:19px; font-weight:900; color:#000;
  }
  .auth-title { font-family:'Orbitron',monospace; font-size:20px; font-weight:700; margin-bottom:6px; }
  .auth-subtitle { font-size:14px; color:var(--text-secondary); }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display:block; font-size:11px; font-weight:600;
    color:var(--text-secondary); margin-bottom:7px;
    letter-spacing:.5px; text-transform:uppercase;
  }
  .form-input {
    width:100%; padding:13px 16px;
    background:var(--bg-input); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-family:'Outfit',sans-serif; font-size:15px; outline:none; transition:all .2s;
  }
  .form-input::placeholder { color:var(--text-muted); }
  .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .auth-error {
    background:rgba(232,91,75,.12); border:1px solid rgba(232,91,75,.3);
    border-radius:var(--radius-sm); padding:10px 14px;
    font-size:13px; color:#f08070; margin-bottom:14px; display:none;
  }
  .auth-error.visible { display:block; }
  .btn-login {
    width:100%; padding:14px;
    background:linear-gradient(135deg,var(--accent),#f5c870);
    border:none; border-radius:var(--radius-sm);
    color:#000; font-family:'Outfit',sans-serif;
    font-size:15px; font-weight:600; cursor:pointer; transition:all .3s; margin-top:6px;
  }
  .btn-login:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 6px 24px rgba(232,184,75,.35); }
  .btn-login:active { transform:translateY(0) scale(.99); }
  .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }
  .auth-divider {
    display:flex; align-items:center; gap:12px;
    margin:18px 0; color:var(--text-muted); font-size:13px;
  }
  .auth-divider::before,.auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .btn-google {
    width:100%; padding:13px;
    background:var(--bg-surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-family:'Outfit',sans-serif; font-size:15px; font-weight:500;
    cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .btn-google:hover { border-color:var(--border-accent); background:var(--bg-input); }
  .auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text-secondary); }
  .auth-footer a { color:var(--accent); text-decoration:none; cursor:pointer; }
  .auth-back {
    position:absolute; top:24px; left:24px;
    background:none; border:none; color:var(--text-secondary);
    cursor:pointer; font-size:13px; font-family:'Outfit',sans-serif;
    display:flex; align-items:center; gap:6px; transition:color .2s; z-index:10;
  }
  .auth-back:hover { color:var(--text-primary); }

  /* ═══ CALCULATOR ═══ */
  .calc-page { flex-direction:column; padding:0; }
  .calc-header {
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding: calc(12px + var(--safe-top)) 20px 12px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(8,11,20,.88); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .calc-header-logo {
    display:flex; align-items:center; gap:9px;
    font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
  }
  .calc-header-icon {
    width:32px; height:32px; border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#f5c870);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; color:#000;
  }
  .calc-header-right { display:flex; align-items:center; gap:8px; }
  .calc-avatar {
    width:32px; height:32px; border-radius:50%;
    background:var(--accent-soft); border:1px solid var(--border-accent);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:600; color:var(--accent);
  }
  .btn-logout {
    background:none; border:1px solid var(--border);
    border-radius:8px; padding:5px 11px;
    color:var(--text-secondary); font-family:'Outfit',sans-serif;
    font-size:12px; cursor:pointer; transition:all .2s;
  }
  .btn-logout:hover { border-color:var(--danger); color:var(--danger); }
  .calc-wrapper {
    padding: calc(80px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
    display:flex; align-items:flex-start; justify-content:center;
    width:100%; min-height:100vh; overflow-y:auto;
  }
  .calculator {
    background:var(--bg-card); border-radius:28px; border:1px solid var(--border);
    padding:20px; width:100%; max-width:360px;
    box-shadow:0 40px 100px rgba(0,0,0,.6);
  }
  .calc-display {
    background:var(--bg-deep); border-radius:18px; padding:18px 18px 16px;
    margin-bottom:18px; min-height:105px;
    border:1px solid var(--border);
    display:flex; flex-direction:column; justify-content:flex-end;
    position:relative; overflow:hidden;
  }
  .calc-display::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:.5;
  }
  .calc-expression {
    font-size:13px; color:var(--text-muted); text-align:right;
    min-height:18px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-bottom:5px;
  }
  .calc-result {
    font-family:'Orbitron',monospace;
    font-size:clamp(26px,7vw,38px); font-weight:600;
    text-align:right; color:var(--text-primary);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    transition:color .15s; line-height:1.2;
  }
  .calc-result.accent { color:var(--accent); }
  .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; }
  .btn {
    border:none; border-radius:var(--radius-btn); cursor:pointer;
    font-family:'Outfit',sans-serif; font-weight:500; font-size:18px;
    height:clamp(58px,15vw,68px);
    display:flex; align-items:center; justify-content:center;
    transition:all .15s; position:relative; overflow:hidden;
    user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .btn::after {
    content:''; position:absolute; inset:0;
    background:rgba(255,255,255,0); transition:background .15s;
  }
  .btn:hover::after { background:rgba(255,255,255,.05); }
  .btn:active { transform:scale(.93); }
  .btn-num {
    background:var(--btn-num); color:var(--text-primary);
    border:1px solid rgba(255,255,255,.06);
  }
  .btn-op {
    background:var(--btn-op); color:var(--accent);
    border:1px solid var(--border-accent); font-size:22px; font-weight:400;
  }
  .btn-op:hover { background:rgba(232,184,75,.1); }
  .btn-fn {
    background:var(--bg-surface); color:var(--text-secondary);
    border:1px solid var(--border); font-size:14px; font-weight:600;
  }
  .btn-fn:hover { color:var(--text-primary); border-color:rgba(255,255,255,.15); }
  .btn-del {
    background:rgba(232,91,75,.1); color:var(--danger);
    border:1px solid rgba(232,91,75,.25); font-size:15px;
  }
  .btn-del:hover { background:rgba(232,91,75,.18); }
  .btn-eq {
    background:linear-gradient(135deg,var(--accent),#f5c870);
    color:#000; border:none; font-weight:700; font-size:22px;
    box-shadow:0 4px 20px rgba(232,184,75,.3);
  }
  .btn-eq:hover { box-shadow:0 6px 28px rgba(232,184,75,.45); }
  .btn-eq:active { transform:scale(.93); }
  .ripple {
    position:absolute; border-radius:50%; width:80px; height:80px;
    margin-top:-40px; margin-left:-40px;
    background:rgba(255,255,255,.08);
    transform:scale(0); animation:ripple-anim .4s linear; pointer-events:none;
  }
  @keyframes ripple-anim { to { transform:scale(3); opacity:0; } }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fu  { animation:fadeUp .7s ease both; }
  .fu1 { animation-delay:.1s; }
  .fu2 { animation-delay:.25s; }
  .fu3 { animation-delay:.4s; }
  .fu4 { animation-delay:.55s; }
  .calc-wrapper::-webkit-scrollbar { width:4px; }
  .calc-wrapper::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="stars-bg">
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
</div>

<!-- ══════ LANDING ══════ -->
<div class="page active" id="page-landing">
  <div class="landing-content">
    <div class="landing-logo fu fu1">AF</div>
    <p class="landing-eyebrow fu fu1">Ahmed Fares · 2025</p>
    <h1 class="landing-title-en fu fu2">Welcome to Ahmed Fares Calculator</h1>
    <div class="landing-divider fu fu2"></div>
    <p class="landing-title-ar fu fu3">مرحباً بك في الآلة الحاسبة الخاصة بـ Ahmed Fares</p>
    <button class="btn-start fu fu4" onclick="goToAuth()">
      Get Started
      <span class="arrow-circle">→</span>
    </button>
  </div>
</div>

<!-- ══════ AUTH ══════ -->
<div class="page" id="page-auth">
  <button class="auth-back" onclick="goTo('landing')">← Back</button>
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo-sm">AF</div>
      <h2 class="auth-title">Sign In</h2>
      <p class="auth-subtitle">Access your personal calculator</p>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email-input" class="form-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="pass-input" class="form-input" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>
    <div class="auth-divider">or</div>
    <button class="btn-google" id="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <p class="auth-footer">
      Demo: any email + any password<br>
      <a onclick="fillDemo()">Use demo account →</a>
    </p>
  </div>
</div>

<!-- ══════ CALCULATOR ══════ -->
<div class="page calc-page" id="page-calc">
  <header class="calc-header">
    <div class="calc-header-logo">
      <div class="calc-header-icon">AF</div>
      Ahmed Fares Calculator
    </div>
    <div class="calc-header-right">
      <div class="calc-avatar" id="user-avatar">U</div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>
  <div class="calc-wrapper">
    <div class="calculator">
      <div class="calc-display">
        <div class="calc-expression" id="calc-expr"></div>
        <div class="calc-result" id="calc-result">0</div>
      </div>
      <div class="calc-grid">
        <button class="btn btn-fn"  onclick="clearAll(event)">AC</button>
        <button class="btn btn-fn"  onclick="toggleSign(event)">+/−</button>
        <button class="btn btn-fn"  onclick="percent(event)">%</button>
        <button class="btn btn-op"  onclick="setOp(event,'÷')">÷</button>

        <button class="btn btn-num" onclick="appendNum(event,'7')">7</button>
        <button class="btn btn-num" onclick="appendNum(event,'8')">8</button>
        <button class="btn btn-num" onclick="appendNum(event,'9')">9</button>
        <button class="btn btn-op"  onclick="setOp(event,'×')">×</button>

        <button class="btn btn-num" onclick="appendNum(event,'4')">4</button>
        <button class="btn btn-num" onclick="appendNum(event,'5')">5</button>
        <button class="btn btn-num" onclick="appendNum(event,'6')">6</button>
        <button class="btn btn-op"  onclick="setOp(event,'−')">−</button>

        <button class="btn btn-num" onclick="appendNum(event,'1')">1</button>
        <button class="btn btn-num" onclick="appendNum(event,'2')">2</button>
        <button class="btn btn-num" onclick="appendNum(event,'3')">3</button>
        <button class="btn btn-op"  onclick="setOp(event,'+')">+</button>

        <button class="btn btn-del" onclick="deleteLast(event)">⌫</button>
        <button class="btn btn-num" onclick="appendNum(event,'0')">0</button>
        <button class="btn btn-num" style="font-size:22px;font-weight:700" onclick="appendDot(event)">.</button>
        <button class="btn btn-eq"  onclick="calculate(event)">=</button>
      </div>
    </div>
  </div>
</div>

<!-- PWA Install Banner -->
<div class="install-banner" id="install-banner">
  <span>📲 Install as App</span>
  <button onclick="installApp()">Install</button>
  <button class="dismiss" onclick="dismissInstall()">✕</button>
</div>

<script>
// ─── NAVIGATION ───
function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
}
function goToAuth() {
  if (sessionStorage.getItem('af_user')) { goTo('calc'); return; }
  goTo('auth');
}

// ─── AUTH ───
document.getElementById('pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 3500);
}
function doLogin() {
  const email = document.getElementById('email-input').value.trim();
  const pass  = document.getElementById('pass-input').value;
  if (!email) { showError('Please enter your email address.'); return; }
  if (!pass)  { showError('Please enter your password.'); return; }
  if (!email.includes('@')) { showError('Please enter a valid email address.'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Signing in…';
  setTimeout(() => {
    btn.disabled = false; btn.textContent = 'Sign In';
    sessionStorage.setItem('af_user', JSON.stringify({ name: email.split('@')[0], email }));
    loadUserUI(); goTo('calc');
  }, 700);
}

// ─── CALCULATOR ───
let cur = '0', prev = '', op = null, reset = false, expr = '';
function updateDisplay() {
  let d = cur;
  if (d !== 'Error' && d.length > 13) d = parseFloat(d).toExponential(4);
  document.getElementById('calc-result').textContent = d;
  document.getElementById('calc-result').classList.toggle('accent', op !== null && reset);
  document.getElementById('calc-expr').textContent = expr;
}
function appendNum(e, n) {
  ripple(e);
  if (reset) { cur = n; reset = false; }
  else { cur = (cur === '0' && n !== '.') ? n : (cur.length < 13 ? cur + n : cur); }
  updateDisplay();
}
function appendDot(e) {
  ripple(e);
  if (reset) { cur = '0.'; reset = false; updateDisplay(); return; }
  if (!cur.includes('.')) cur += '.';
  updateDisplay();
}
function setOp(e, o) {
  ripple(e);
  if (op && !reset) {
    const r = compute(); prev = String(r); expr = fmt(r) + ' ' + o; cur = String(r);
  } else {
    prev = cur; expr = fmt(parseFloat(cur)) + ' ' + o;
  }
  op = o; reset = true; updateDisplay();
}
function calculate(e) {
  ripple(e);
  if (!op || !prev) return;
  const r = compute();
  expr = ''; cur = String(r); op = null; prev = ''; reset = true;
  const el = document.getElementById('calc-result');
  el.classList.add('accent'); setTimeout(() => el.classList.remove('accent'), 300);
  updateDisplay();
}
function compute() {
  const a = parseFloat(prev), b = parseFloat(cur);
  if (op === '+') return round(a + b);
  if (op === '−') return round(a - b);
  if (op === '×') return round(a * b);
  if (op === '÷') return b !== 0 ? round(a / b) : 'Error';
}
function round(n) { return typeof n === 'string' ? n : Math.round(n * 1e10) / 1e10; }
function fmt(n) { return isNaN(n) ? n : parseFloat(n.toString()); }
function clearAll(e) { if(e) ripple(e); cur='0'; prev=''; op=null; reset=false; expr=''; updateDisplay(); }
function deleteLast(e) {
  ripple(e);
  if (reset || cur === 'Error') return;
  cur = cur.length > 1 ? cur.slice(0,-1) : '0';
  updateDisplay();
}
function toggleSign(e) {
  ripple(e);
  if (cur !== '0' && cur !== 'Error') { cur = cur.startsWith('-') ? cur.slice(1) : '-'+cur; updateDisplay(); }
}
function percent(e) {
  ripple(e);
  if (cur !== 'Error') { cur = String(round(parseFloat(cur) / 100)); updateDisplay(); }
}
function ripple(e) {
  if (!e || !e.currentTarget) return;
  const b = e.currentTarget, s = document.createElement('span');
  s.className = 'ripple';
  const r = b.getBoundingClientRect();
  s.style.left = ((e.clientX||r.left+r.width/2) - r.left) + 'px';
  s.style.top  = ((e.clientY||r.top+r.height/2) - r.top) + 'px';
  b.appendChild(s); setTimeout(() => s.remove(), 450);
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (!document.getElementById('page-calc').classList.contains('active')) return;
  if (e.key >= '0' && e.key <= '9') appendNum(null, e.key);
  else if (e.key === '.') appendDot(null);
  else if (e.key === '+') setOp(null, '+');
  else if (e.key === '-') setOp(null, '−');
  else if (e.key === '*') setOp(null, '×');
  else if (e.key === '/') { e.preventDefault(); setOp(null, '÷'); }
  else if (e.key === 'Enter' || e.key === '=') calculate(null);
  else if (e.key === 'Backspace') deleteLast(null);
  else if (e.key === 'Escape') clearAll(null);
});

// ─── PWA INSTALL ───
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  setTimeout(() => document.getElementById('install-banner').classList.add('show'), 2000);
});
function installApp() {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  dismissInstall();
}
function dismissInstall() {
  document.getElementById('install-banner').classList.remove('show');
}
window.addEventListener('appinstalled', () => dismissInstall());

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Init
updateDisplay();
if (sessionStorage.getItem('af_user')) loadUserUI();
